<form class="flex flex-col gap-2" action='' id="toSendEmail"  method="post" enctype='multipart/form-data'>
    {% csrf_token %}
    {% for field in email_form_crowdfund %}
        {% if not field.is_hidden %}
        <b>{{field.label_tag}}</b>
        {% endif %}
        <div class="textEditorWrapper">
            {{ field }}
        </div>
        {% for error in field.errors %}
        <p class="form_error">{{ error }}</p>
        {% endfor %}	
    {% endfor %}
</form>
